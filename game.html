<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8"/>
        <title>Ghost Hunter</title>
        <style>
            body {
                margin: 0;
                background: #000;
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
            }
        </style>
    </head>
    <body>
        <canvas id="canvas" width="640" height="400"></canvas>
        <script src="wasm_exec.js"></script>
        <script>
            const go = new Go();
            WebAssembly.instantiateStreaming(fetch("ghosthunter.wasm"), go.importObject).then((result) => {
                go.run(result.instance);
            });
        </script>
    </body>
</html>
