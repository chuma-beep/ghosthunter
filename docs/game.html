<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ghost Hunter</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; display: flex; align-items: center; justify-content: center; width: 640px; height: 400px; overflow: hidden; }
        canvas { display: block; }
        #loading { color: #ff4444; font-family: monospace; font-size: 1.2em; }
    </style>
</head>
<body>
    <div id="loading">LOADING...</div>
    <script src="wasm_exec.js"></script>
    <script>
        const go = new Go();
        WebAssembly.instantiateStreaming(
            fetch("ghosthunter.wasm"),
            go.importObject
        ).then(result => {
            document.getElementById("loading").style.display = "none";
            go.run(result.instance);
        }).catch(err => {
            document.getElementById("loading").textContent = "Error: " + err;
        });
    </script>
</body>
</html>
